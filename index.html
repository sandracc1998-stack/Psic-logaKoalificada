<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Psicóloga Koalificada — Sandra Carrera</title>
  
  <link rel="preconnect" href="https://googleapis.com" />
  <link href="https://googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  
  <style>
    :root {
      --cream:  #FAF6F0;
      --blush:  #EDD9CC;
      --rose:   #C9897A;
      --mauve:  #8B5E6A;
      --bark:   #5C3D3D;
      --text:   #3D2929;
      --muted:  #9A7878;
      --white:  #FFFFFF;
      --ff-display: 'Cormorant Garamond', Georgia, serif;
      --ff-body:    'DM Sans', system-ui, sans-serif;
      --radius-sm: 12px;
      --radius-md: 20px;
      --radius-lg: 32px;
      --shadow: 0 4px 24px rgba(92,61,61,.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--cream); color: var(--text); font-family: var(--ff-body); font-size: 1rem; line-height: 1.65; }

    /* MENÚ DE NAVEGACIÓN */
    nav { position: sticky; top: 0; z-index: 100; background: rgba(250,246,240,.92); backdrop-filter: blur(8px); border-bottom: 1px solid var(--blush); display: flex; align-items: center; justify-content: space-between; padding: .75rem 2rem; }
    .nav-logo { font-family: var(--ff-display); font-size: 1.25rem; color: var(--mauve); text-decoration: none; font-style: italic; }
    .nav-links { display: flex; gap: 1.75rem; list-style: none; align-items: center; }
    .nav-links a { text-decoration: none; color: var(--bark); font-size: .875rem; font-weight: 500; letter-spacing: .02em; transition: color .2s; }
    .nav-links a:hover { color: var(--rose); }
    .boton-nav { background: var(--bark); color: var(--white) !important; padding: 0.5rem 1rem; border-radius: var(--radius-sm); text-decoration: none; font-size: 0.85rem; transition: background 0.3s; }
    .boton-nav:hover { background: var(--rose); color: var(--white) !important; }

    /* SECCIÓN DE BIENVENIDA (HERO) */
    .hero-seccion {
      background-color: var(--white);
      padding: 4rem 0;
      width: 100%;
    }

    .hero-layout {
      display: flex !important;
      flex-direction: row !important;
      align-items: center !important;
      justify-content: space-between !important;
      gap: 50px;
      max-width: 1150px;
      margin: 0 auto;
      padding: 0 24px;
      box-sizing: border-box;
    }

    .hero-texto {
      flex: 1 !important;
      text-align: left !important;
    }

    .hero-title {
      font-family: var(--ff-display);
      color: var(--bark);
      font-size: 3.2rem;
      font-weight: 700;
      margin: 0 0 0.5rem 0;
      letter-spacing: -0.5px;
      text-align: left;
    }

    .hero-tagline {
      color: var(--bark);
      font-size: 1.15rem;
      opacity: 0.8;
      margin: 0 0 2.5rem 0;
      font-weight: 500;
      text-align: left;
    }

    .hero-saludo {
      font-family: var(--ff-display);
      color: var(--bark);
      font-size: 2rem;
      font-weight: 600;
      margin: 0 0 1rem 0;
      text-align: left;
    }

    .hero-frase {
      font-size: 1.1rem;
      font-style: italic;
      color: #555;
      margin: 0 0 1.5rem 0;
      line-height: 1.5;
      text-align: left;
    }

    .hero-descripcion {
      font-size: 1rem;
      color: #4a4a4a;
      line-height: 1.6;
      margin: 0 0 1.2rem 0;
      text-align: justify;
    }

    .photo-card {
      flex: 0 0 320px !important;
      max-width: 320px !important;
      display: flex !important;
      justify-content: center;
      align-items: center;
    }

    .photo-card img {
      width: 100%;
      height: auto;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow);
      object-fit: contain;
    }

    /* SECCIONES ELEMENTOS COMUNES */
    section { padding: 5rem 2rem; }
    .section-inner { max-width: 1100px; margin: 0 auto; }
    .section-title { font-family: var(--ff-display); font-size: clamp(2rem, 3.5vw, 2.8rem); font-weight: 400; color: var(--bark); margin-bottom: 1rem; line-height: 1.2; text-align: center; }
    .title-underline { width: 60px; height: 3px; background-color: var(--rose); margin: 0 auto 3rem auto; border-radius: 2px; }

    /* SECCIÓN MIS VALORES */
    #mis-valores { background: var(--white); }
    .seccion-valores-cabecera { text-align: center; margin-bottom: 3rem; }
    .valores-titulo { font-family: var(--ff-display); font-size: 2.2rem; color: var(--bark); font-weight: 600; margin-bottom: 0.5rem; }
    .linea-decorativa { width: 60px; height: 3px; background-color: var(--rose); margin: 0 auto; border-radius: 2px; }
    .values-list { display: flex; flex-direction: row; justify-content: space-between; gap: 1.25rem; width: 100%; flex-wrap: wrap; }
    .value-item { flex: 1; min-width: 220px; background-color: var(--cream); border: 1px solid var(--blush); border-radius: var(--radius-md); padding: 2rem 1.5rem; box-shadow: var(--shadow); transition: transform 0.3s ease, box-shadow 0.3s ease; display: flex; flex-direction: column; align-items: flex-start; }
    .value-item:hover { transform: translateY(-4px); box-shadow: 0 12px 36px rgba(92,61,61,.12); }
    .value-icon { font-size: 2rem; margin-bottom: 1rem; }
    .value-name { font-family: var(--ff-display); font-size: 1.25rem; font-weight: 600; color: var(--bark); margin-bottom: .5rem; }
    .value-desc { font-size: .9rem; color: var(--muted); line-height: 1.6; }

    /* SECCIÓN CÓMO TRABAJO */
    #como-trabajo { background: var(--cream); padding: 5rem 2rem; }
    .como-trabajo-cabecera { text-align: center; margin-bottom: 3rem; }
    .como-trabajo-contenedor { display: flex !important; flex-direction: row !important; justify-content: center !important; gap: 24px !important; width: 100% !important; perspective: 1000px !important; flex-wrap: wrap !important; }
    .tarjeta-giratoria { flex: 1 !important; min-width: 280px !important; max-width: 360px !important; height: 440px !important; background-color: transparent !important; }
    .tarjeta-interno { position: relative !important; width: 100% !important; height: 100% !important; text-align: left !important; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1) !important; transform-style: preserve-3d !important; box-shadow: var(--shadow) !important; border-radius: var(--radius-md) !important; }
    .tarjeta-giratoria:hover .tarjeta-interno { transform: rotateY(180deg) !important; }
    .tarjeta-frontal, .tarjeta-trasera { position: absolute !important; width: 100% !important; height: 100% !important; -webkit-backface-visibility: hidden !important; backface-visibility: hidden !important; border-radius: var(--radius-md) !important; box-sizing: border-box !important; }
    
    .tarjeta-frontal { background-color: var(--blush) !important; padding: 24px 20px 0 20px !important; display: flex !important; flex-direction: column !important; }
    .contenido-frontal { display: flex !important; flex-direction: column !important; height: 100% !important; justify-content: space-between !important; }
    .bloque-texto-frontal { text-align: center !important; margin-bottom: 15px !important; }
    .tarjeta-frontal h3 { font-family: var(--ff-display) !important; color: var(--bark) !important; font-size: 1.6rem !important; font-weight: 600 !important; letter-spacing: 0.5px !important; margin: 0 0 10px 0 !important; text-align: center !important; }
    .subtitulo-frontal { color: var(--text) !important; font-size: 0.95rem !important; line-height: 1.4 !important; margin: 0 !important; text-align: center !important; opacity: 0.9 !important; }
    .bloque-imagen-frontal { flex: 1 !important; display: flex !important; align-items: flex-end !important; justify-content: center !important; overflow: hidden !important; border-bottom-left-radius: var(--radius-md) !important; border-bottom-right-radius: var(--radius-md) !important; }
    .imagen-frontal-tarjeta { width: 100% !important; height: 90% !important; object-fit: contain !important; mix-blend-mode: multiply !important; }
    
    .tarjeta-trasera { background-color: var(--bark) !important; color: var(--cream) !important; transform: rotateY(180deg) !important; display: flex !important; align-items: flex-start !important; border: 2px solid var(--cream) !important; overflow-y: auto !important; padding: 28px 24px !important; }
    .contenido-trasero { width: 100% !important; display: flex !important; flex-direction: column !important; gap: 16px !important; }
    .titulo-trasero { font-family: var(--ff-display) !important; color: var(--cream) !important; font-size: 1.2rem !important; font-weight: bold !important; margin: 0 !important; letter-spacing: 1px !important; border-bottom: 1px solid rgba(255, 255, 255, 0.2) !important; padding-bottom: 8px !important; text-align: center !important; }
    .tarjeta-trasera ul { list-style-type: none !important; padding: 0 !important; margin: 0 !important; }
    .tarjeta-trasera li { font-size: 0.85rem !important; line-height: 1.45; margin-bottom: 12px !important; position: relative !important; padding-left: 15px !important; text-align: left !important; color: var(--cream) !important; }
    .tarjeta-trasera li strong { color: var(--white) !important; }
    .tarjeta-trasera li::before { content: "•" !important; color: var(--rose) !important; position: absolute !important; left: 0 !important; top: 0 !important; font-weight: bold !important; }
    .tarjeta-trasera li:last-child { margin-bottom: 0 !important; }

    /* SECCIÓN CONTACTO UNIFICADA */
    #seccion-contacto { background-color: var(--cream) !important; padding: 5rem 2rem !important; width: 100% !important; display: block !important; }
    #seccion-contacto .section-inner { max-width: 1100px !important; margin: 0 auto !important; }
.contacto-flex-contenedor { display: flex !important; flex-direction: row !important; justify-content: center !important; align-items: stretch !important; gap: 40px !important; width: 100% !important; flex-wrap: wrap !important; }.tarjeta-datos-contacto-oscura, .formulario-contacto { flex: 1 !important; min-width: 320px !important; max-width: 460px !important; box-sizing: border-box !important; }.tarjeta-datos-contacto-oscura { background-color: var(--bark) !important; border: 2px solid var(--blush) !important; padding: 35px 30px !important; border-radius: 24px !important; box-shadow: var(--shadow) !important; }.datos-contacto-cabecera { display: flex !important; align-items: center !important; justify-content: center !important; gap: 8px !important; margin-bottom: 25px !important; }.datos-contacto-titulo { font-family: var(--ff-display) !important; color: var(--cream) !important; font-size: 1.6rem !important; font-weight: 600 !important; margin: 0 !important; }.corazon-icono { font-size: 1.3rem !important; }.lista-datos-contacto { list-style: none !important; padding: 0 !important; margin: 0 !important; display: flex !important; flex-direction: column !important; gap: 20px !important; }.lista-datos-contacto li { display: flex !important; align-items: center !important; gap: 14px !important; }.lista-datos-contacto li::before { content: none !important; }.dato-icono { font-size: 1.2rem !important; width: 24px !important; text-align: center !important; flex-shrink: 0 !important; }.dato-linea { flex: 1 !important; display: flex !important; justify-content: flex-start !important; align-items: center !important; gap: 8px !important; border-bottom: 1px solid rgba(250, 246, 240, 0.2) !important; padding-bottom: 8px !important; }.dato-etiqueta { font-weight: 600 !important; color: var(--white) !important; font-size: 0.95rem !important; }.dato-valor { color: var(--cream) !important; font-size: 0.95rem !important; }/* FORMULARIO DE CONTACTO BLANCO */.formulario-contacto { padding: 35px 30px !important; background-color: #ffffff !important; border-radius: 24px !important; box-shadow: var(--shadow) !important; }.titulo-contacto { color: var(--bark) !important; font-size: 24px !important; margin-bottom: 20px !important; font-family: var(--ff-display) !important; font-weight: 600 !important; }.campo-grupo { margin-bottom: 20px; text-align: left; }.campo-grupo label { display: block; margin-bottom: 8px; color: var(--bark); font-weight: 600; font-size: 14px; }.campo-grupo input, .campo-grupo textarea { width: 100%; padding: 12px; border: 1px solid #e0dcd8; border-radius: 8px; font-size: 15px; color: #333333; background-color: #fdfcfb; box-sizing: border-box; }.campo-grupo textarea { height: 120px; resize: vertical; }.boton-enviar { width: 100%; padding: 14px; background-color: var(--bark); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background-color 0.3s ease; }.boton-enviar:hover { background-color: var(--rose); }/* RESPONSIVE */@media (max-width: 768px) {.hero-layout { flex-direction: column !important; gap: 35px; text-align: center; }.hero-texto { text-align: center !important; }.hero-title, .hero-tagline, .hero-saludo, .hero-frase { text-align: center !important; }.hero-descripcion { text-align: left; }.photo-card { flex: 0 0 auto !important; width: 75%; max-width: 260px !important; }.values-list { flex-direction: column; gap: 1.5rem; }.como-trabajo-contenedor { flex-direction: column; align-items: center; }.tarjeta-giratoria { width: 100%; max-width: 400px; }.contacto-flex-contenedor { flex-direction: column !important; align-items: center !important; gap: 30px !important; }.tarjeta-datos-contacto-oscura, .formulario-contacto { max-width: 100% !important; width: 100% !important; }.dato-linea { flex-direction: column; align-items: flex-start; gap: 4px; }}Sandra CarreraSobre míMis ValoresCómo trabajoContacto📍Ubicación:Santiago de Compostela🌐Instagram:@koala.psicoeducativa
