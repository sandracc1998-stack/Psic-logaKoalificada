<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sandra Carrera — Psicóloga especializada en TEA y NEE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream:  #FAF6F0;
      --blush:  #EDD9CC;
      --rose:   #C9897A;
      --mauve:  #8B5E6A;
      --bark:   #5C3D3D;
      --text:   #3D2929;
      --muted:  #9A7878;
      --white:  #FFFFFF;
      --dark:   #3D2929;
      --ff-display: 'Cormorant Garamond', Georgia, serif;
      --ff-body:    'DM Sans', system-ui, sans-serif;
      --radius-sm: 12px;
      --radius-md: 20px;
      --radius-lg: 32px;
      --shadow: 0 4px 24px rgba(92,61,61,.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--cream); color: var(--text); font-family: var(--ff-body); font-size: 1rem; line-height: 1.65; }

    /* MENÚ DE NAVEGACIÓN */
    nav { position: sticky; top: 0; z-index: 100; background: rgba(250,246,240,.92); backdrop-filter: blur(8px); border-bottom: 1px solid var(--blush); display: flex; align-items: center; justify-content: space-between; padding: .75rem 2rem; }
    .nav-logo { font-family: var(--ff-display); font-size: 1.25rem; color: var(--mauve); text-decoration: none; font-style: italic; }
    .nav-links { display: flex; gap: 1.75rem; list-style: none; }
    .nav-links a { text-decoration: none; color: var(--bark); font-size: .875rem; font-weight: 500; letter-spacing: .02em; transition: color .2s; }
    .nav-links a:hover { color: var(--rose); }

    /* SECCIÓN BIENVENIDA (HERO) */
    .hero { display: grid; grid-template-columns: 1fr 1fr; min-height: 88vh; align-items: center; max-width: 1100px; margin: 0 auto; padding: 4rem 2rem; gap: 4rem; }
    .eyebrow { display: inline-block; font-size: .75rem; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; color: var(--rose); margin-bottom: 1rem; }
    .hero h1 { font-family: var(--ff-display); font-size: clamp(2.8rem, 5vw, 4.2rem); font-weight: 400; line-height: 1.12; color: var(--bark); margin-bottom: 1.5rem; }
    .hero h1 em { font-style: italic; color: var(--mauve); }
    .about-quote { font-family: var(--ff-display); font-size: 1.5rem; font-style: italic; color: var(--mauve); border-left: 3px solid var(--blush); padding-left: 1.5rem; margin-bottom: 1.5rem; line-height: 1.4; }
    .about-body { color: var(--text); line-height: 1.75; margin-bottom: 1rem; }
    
    .btn-primary { display: inline-block; background: var(--mauve); color: var(--white); text-decoration: none; padding: .85rem 2rem; border-radius: 999px; font-weight: 500; font-size: .95rem; letter-spacing: .02em; transition: background .2s, transform .15s; border: none; cursor: pointer; margin-top: 1rem; text-align: center; }
    .btn-primary:hover { background: var(--bark); transform: translateY(-1px); }
    
    .photo-card { position: relative; border-radius: var(--radius-lg); overflow: hidden; aspect-ratio: 4/5; background: var(--blush); box-shadow: 0 16px 48px rgba(92,61,61,.14); }
    .photo-card img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* CONTENEDORES Y SECCIONES */
    section { padding: 5rem 2rem; }
    .section-inner { max-width: 1100px; margin: 0 auto; }
    .section-label { font-size: .75rem; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; color: var(--rose); margin-bottom: .5rem; display: block; text-align: center; }
    .section-title { font-family: var(--ff-display); font-size: clamp(2rem, 3.5vw, 2.8rem); font-weight: 400; color: var(--bark); margin-bottom: 1rem; line-height: 1.2; text-align: center; }
    .section-title em { font-style: italic; color: var(--mauve); }
    .section-intro { font-size: 1.05rem; color: var(--muted); max-width: 560px; margin: 0 auto 3rem; text-align: center; }

    /* DISEÑO EXCLUSIVO: MIS VALORES */
    #mis-valores { background: var(--white); }
    .seccion-valores-cabecera { text-align: center; margin-bottom: 3rem; }
    .valores-titulo { font-family: var(--ff-display); font-size: 2.2rem; color: var(--bark); font-weight: 600; margin-bottom: 0.5rem; }
    .linea-decorativa { width: 60px; height: 3px; background-color: var(--rose); margin: 0 auto; border-radius: 2px; }
    
    .values-list { display: flex; flex-direction: row; justify-content: space-between; gap: 1.25rem; width: 100%; flex-wrap: wrap; }
    .value-item { flex: 1; min-width: 220px; background-color: var(--cream); border: 1px solid var(--blush); border-radius: var(--radius-md); padding: 2rem 1.5rem; box-shadow: var(--shadow); transition: transform 0.3s ease, box-shadow 0.3s ease; display: flex; flex-direction: column; align-items: flex-start; }
    .value-item:hover { transform: translateY(-4px); box-shadow: 0 12px 36px rgba(92,61,61,.12); }
    .value-icon { font-size: 2rem; margin-bottom: 1rem; }
    .value-name { font-family: var(--ff-display); font-size: 1.25rem; font-weight: 600; color: var(--bark); margin-bottom: .5rem; }
    .value-desc { font-size: .9rem; color: var(--muted); line-height: 1.6; }

    /* DISEÑO EXCLUSIVO: SERVICIOS */
    #servicios { background: var(--cream); }
    .servicios-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; width: 100%; }
    .servicio-card { background: var(--white); border: 1px solid var(--blush); border-radius: var(--radius-md); padding: 2.5rem 2rem; box-shadow: var(--shadow); transition: transform 0.3s; }
    .servicio-card:hover { transform: translateY(-3px); }
    .servicio-icon { font-size: 2.5rem; margin-bottom: 1rem; color: var(--mauve); }
    .servicio-card h3 { font-family: var(--ff-display); font-size: 1.5rem; color: var(--bark); margin-bottom: 1rem; font-weight: 500; }
    .servicio-card p { font-size: .95rem; color: var(--text); line-height: 1.6; }

    /* DISEÑO EXCLUSIVO: CÓMO TRABAJO (TARJETAS GIRATORIAS 3D) */
    #como-trabajo { background: var(--white); }
    .como-trabajo-cabecera { text-align: center; margin-bottom: 3rem; }
    .como-trabajo-contenedor { display: flex; flex-direction: row; justify-content: center; gap: 24px; width: 100%; perspective: 1000px; flex-wrap: wrap; }
    .tarjeta-giratoria { flex: 1; min-width: 280px; height: 440px; background-color: transparent; }
    .tarjeta-interno { position: relative; width: 100%; height: 100%; text-align: left; transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; box-shadow: var(--shadow); border-radius: var(--radius-md); }
    .tarjeta-giratoria:hover .tarjeta-interno { transform: rotateY(180deg); }
    .tarjeta-frontal, .tarjeta-trasera { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: var(--radius-md); padding: 28px 24px; box-sizing: border-box; }
    .tarjeta-frontal { background-color: var(--bark); display: flex; align-items: center; justify-content: center; }
    .tarjeta-frontal h3 { font-family: var(--ff-display); color: var(--cream); font-size: 1.5rem; font-weight: 500; letter-spacing: 1px; text-align: center; margin: 0; }
    .tarjeta-trasera { background-color: var(--cream); color: var(--bark); transform: rotateY(180deg); display: flex; align-items: center; border: 2px solid var(--bark); }
    .tarjeta-trasera ul { list-style-type: none; padding: 0; margin: 0; }
    .tarjeta-trasera li { font-size: 0.85rem; line-height: 1.45; margin-bottom: 12px; position: relative; padding-left: 15px; }
    .tarjeta-trasera li::before { content: "•"; color: var(--bark); position: absolute; left: 0; top: 0; font-weight: bold; }
    .tarjeta-trasera li:last-child { margin-bottom: 0; }

    /* DISEÑO EXCLUSIVO: CONTACTO CON FORMULARIO */
    #contacto { background: var(--cream); }
    .contacto-wrapper { display: grid; grid-template-columns: 1fr 1.2fr; gap: 4rem; align-items: start; margin-top: 2rem; }
    .contacto-info { text-align: left; }
    .contacto-info p { margin-bottom: 1.5rem; color: var(--text); }
    .form-grupo { margin-bottom: 1.5rem; text-align: left; }
    .form-grupo label { display: block; font-size: .85rem; font-weight: 500; color: var(--bark); margin-bottom: .5rem; }
    .form-control { width: 100%; padding: .85rem 1rem; border: 1px solid var(--blush); background: var(--white); border-radius: var(--radius-sm); font-family: var(--ff-body); color: var(--text); font-size: .95rem; transition: border-color .2s; }
    .form-control:focus { outline: none; border-color: var(--rose); }
    textarea.form-control { resize: vertical; min-height: 120px; }

    /* ADAPTACIÓN MÓVIL GENERAL */
    @media (max-width: 900px) {
      .hero { grid-template-columns: 1fr; text-align: center; gap: 2rem; padding: 2rem 1rem; }
      .photo-card { max-width: 400px; margin: 0 auto; }
      .about-quote { border-left: none; border-top: 2px solid var(--blush); border-bottom: 2px solid var(--blush); padding: 1rem 0; }
      .values-list { flex-direction: column; gap: 1.5rem; }
      .como-trabajo-contenedor { flex-direction: column; align-items: center; }
      .tarjeta-giratoria { width: 100%; max-width: 400px; }
      .contacto-wrapper { grid-template-columns: 1fr; gap: 2.5rem; }
      .contacto-info { text-align: center; }
    }
  </style>
</head>
<body>

  <!-- MENÚ DE NAVEGACIÓN -->
  <nav>
    <a href="#" class="nav-logo">Sandra Carrera</a>
    <ul class="nav-links">
      <li><a href="#sobre-mi">Sobre mí</a></li>
      <li><a href="#mis-valores">Mis Valores</a></li>
      <li><a href="#servicios">Servicios</a></li>
      <li><a href="#como-trabajo">Cómo trabajo</a></li>
      <li><a href="#contacto">Contacto</a></li>
    </ul>
  </nav>
