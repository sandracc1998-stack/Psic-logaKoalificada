<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Psicóloga Koalificada — Sandra Carrera</title>
  
  <link rel="preconnect" href="https://googleapis.com" />
  <link href="https://googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  
  <style>
    :root {
      --cream:  #FAF6F0;
      --blush:  #EDD9CC;
      --rose:   #C9897A;
      --mauve:  #8B5E6A;
      --bark:   #5C3D3D;
      --text:   #3D2929;
      --muted:  #9A7878;
      --white:  #FFFFFF;
      --ff-display: 'Cormorant Garamond', Georgia, serif;
      --ff-body:    'DM Sans', system-ui, sans-serif;
      --radius-sm: 12px;
      --radius-md: 20px;
      --radius-lg: 32px;
      --shadow: 0 4px 24px rgba(92,61,61,.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--cream); color: var(--text); font-family: var(--ff-body); font-size: 1rem; line-height: 1.65; }

    /* Estilos generales simplificados para brevedad */
    nav { position: sticky; top: 0; z-index: 100; background: rgba(250,246,240,.92); backdrop-filter: blur(8px); border-bottom: 1px solid var(--blush); display: flex; align-items: center; justify-content: space-between; padding: .75rem 2rem; }
    .nav-logo { font-family: var(--ff-display); font-size: 1.25rem; color: var(--mauve); text-decoration: none; font-style: italic; }
    .nav-links { display: flex; gap: 1.75rem; list-style: none; }
    .nav-links a { text-decoration: none; color: var(--bark); font-size: .875rem; font-weight: 500; }
    
    .hero-seccion { background-color: var(--white); padding: 4rem 0; }
    .hero-layout { display: flex; flex-direction: row; align-items: center; justify-content: space-between; gap: 50px; max-width: 1150px; margin: 0 auto; padding: 0 24px; }
    .photo-card { flex: 0 0 320px; img { width: 100%; border-radius: var(--radius-md); } }

    section { padding: 5rem 2rem; }
    .section-inner { max-width: 1100px; margin: 0 auto; }
    .section-title { font-family: var(--ff-display); text-align: center; color: var(--bark); }

    .values-list { display: flex; flex-wrap: wrap; gap: 1.25rem; }
    .value-item { flex: 1; min-width: 220px; background-color: var(--white); border: 1px solid var(--blush); padding: 2rem; border-radius: var(--radius-md); }

    /* Contenedor Flex para el Contacto - Petición específica */
    .contacto-flex-contenedor { display: flex; flex-direction: row; justify-content: center; align-items: flex-start; gap: 45px; max-width: 1100px; margin: 0 auto; flex-wrap: wrap; }
    
    .tarjeta-datos-contacto, .formulario-contacto { flex: 1; min-width: 320px; max-width: 480px; box-sizing: border-box; }
    
    .tarjeta-datos-contacto { background-color: var(--cream); border: 2px dashed var(--bark); padding: 35px 30px; border-radius: 24px; }
    .lista-datos-contacto { list-style: none; padding: 0; }
    .lista-datos-contacto li { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }

    .formulario-contacto { background-color: #ffffff; padding: 30px; border-radius: 12px; }
    .campo-grupo { margin-bottom: 20px; }
    .campo-grupo input, .campo-grupo textarea { width: 100%; padding: 12px; border: 1px solid #e0dcd8; border-radius: 8px; }
    .boton-enviar { width: 100%; padding: 14px; background-color: #4a2828; color: white; border: none; border-radius: 8px; cursor: pointer; }

    @media (max-width: 768px) {
      .hero-layout, .contacto-flex-contenedor { flex-direction: column; text-align: center; }
      .photo-card { max-width: 260px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="#" class="nav-logo">Sandra Carrera</a>
    <ul class="nav-links">
      <li><a href="#inicio">Sobre mí</a></li>
      <li><a href="#mis-valores">Mis Valores</a></li>
      <li><a href="#como-trabajo">Cómo trabajo</a></li>
      <li><a href="#seccion-contacto">Contacto</a></li>
    </ul>
  </nav>

  <section id="inicio" class="hero-seccion">
    <div class="section-inner">
      <div class="hero-layout">
        <div class="hero-texto">
          <h1>Psicóloga Koalificada</h1>
          <p>Sandra Carrera — Gabinete de Psicología Infantil</p>
        </div>
        <div class="photo-card">
          <img src="imagen-sandra-koala.png" alt="Sandra Carrera">
        </div>
      </div>
    </div>
  </section>

  <section id="seccion-contacto">
    <div class="section-inner">
      <div class="contacto-flex-contenedor">
        <div class="tarjeta-datos-contacto">
          <h3>Mis datos</h3>
          <ul class="lista-datos-contacto">
            <li>📍 Santiago de Compostela</li>
            <li>📞 +34 678 51 78 90</li>
            <li>✉️ psikoala@psikoala.com</li>
          </ul>
        </div>
        <div class="formulario-contacto">
          <form action="#" method="POST">
            <h2>Contacto</h2>
            <div class="campo-grupo"><input type="text" placeholder="Nombre" required></div>
            <div class="campo-grupo"><input type="email" placeholder="Email" required></div>
            <div class="campo-grupo"><textarea placeholder="Mensaje" required></textarea></div>
            <button type="submit" class="boton-enviar">Enviar</button>
          </form>
        </div>
      </div>
    </div>
  </section>

</body>
</html>
