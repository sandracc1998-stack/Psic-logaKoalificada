  <style>
    :root {
      --cream:  #FAF6F0;
      --blush:  #EDD9CC;

      --mauve:  #8B5E6A;
      --bark:   #5C3D3D;
      --text:   #3D2929;

      --white:  #FFFFFF;

      --radius-sm: 12px;
      --radius-md: 20px;
      --radius-lg: 32px;
      --shadow: 0 4px 24px rgba(92,61,61,.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--cream); color: var(--text); font-family: var(--ff-body); font-size: 1rem; line-height: 1.65; }

    .nav-logo { font-family: var(--ff-display); font-size: 1.25rem; color: var(--mauve); text-decoration: none; font-style: italic; }
    .nav-links { display: flex; gap: 1.75rem; list-style: none; }
    .nav-links a { text-decoration: none; color: var(--bark); font-size: .875rem; font-weight: 500; letter-spacing: .02em; transition: color .2s; }
    .nav-links a:hover { color: var(--rose); }

    /* SECCIÓN PRINCIPAL PRESENTACIÓN */
    .hero-seccion { max-width: 1100px; margin: 0 auto; padding: 4rem 2rem; }
    .hero-grid { display: grid; grid-template-columns: 1fr 1fr; align-items: center; gap: 4rem; min-height: 70vh; }
    .eyebrow { display: inline-block; font-size: .75rem; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; color: var(--rose); margin-bottom: 1rem; }
    .hero-grid h1 { font-family: var(--ff-display); font-size: clamp(2.8rem, 5vw, 4.2rem); font-weight: 400; line-height: 1.12; color: var(--bark); margin-bottom: 1.5rem; }
    .hero-grid h1 em { font-style: italic; color: var(--mauve); }
    .about-quote { font-family: var(--ff-display); font-size: 1.5rem; font-style: italic; color: var(--mauve); border-left: 3px solid var(--blush); padding-left: 1.5rem; margin-bottom: 1.5rem; line-height: 1.4; }
    .about-body { color: var(--text); line-height: 1.75; margin-bottom: 1rem; }
    .btn-primary { display: inline-block; background: var(--mauve); color: var(--white); text-decoration: none; padding: .85rem 2rem; border-radius: 999px; font-weight: 500; font-size: .95rem; letter-spacing: .02em; transition: background .2s, transform .15s; border: none; cursor: pointer; margin-top: 1rem; }
    .btn-primary:hover { background: var(--bark); transform: translateY(-1px); }
    
    /* CONFIGURACIÓN IMAGEN KOALA */
    .photo-card { position: relative; border-radius: var(--radius-lg); overflow: hidden; aspect-ratio: 4/5; background: var(--blush); box-shadow: 0 16px 48px rgba(92,61,61,.14); width: 100%; }
    .photo-card img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* SECCIONES COMUNES */
    section { padding: 5rem 2rem; }
    .section-inner { max-width: 1100px; margin: 0 auto; }
    .section-label { font-size: .75rem; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; color: var(--rose); margin-bottom: .5rem; display: block; }
    .section-title { font-family: var(--ff-display); font-size: clamp(2rem, 3.5vw, 2.8rem); font-weight: 400; color: var(--bark); margin-bottom: 1rem; line-height: 1.2; }

    /* SECCIÓN MIS VALORES */
    #mis-valores { background: var(--white); }
    .seccion-valores-cabecera { text-align: center; margin-bottom: 3rem; }
    .valores-titulo { font-family: var(--ff-display); font-size: 2.2rem; color: var(--bark); font-weight: 600; margin-bottom: 0.5rem; }
    .linea-decorativa { width: 60px; height: 3px; background-color: var(--rose); margin: 0 auto; border-radius: 2px; }
    
    .values-list { display: flex; flex-direction: row; justify-content: space-between; gap: 1.25rem; width: 100%; flex-wrap: wrap; }
    .value-item { flex: 1; min-width: 220px; background-color: var(--cream); border: 1px solid var(--blush); border-radius: var(--radius-md); padding: 2rem 1.5rem; box-shadow: var(--shadow); transition: transform 0.3s ease, box-shadow 0.3s ease; display: flex; flex-direction: column; align-items: flex-start; }
    .value-item:hover { transform: translateY(-4px); box-shadow: 0 12px 36px rgba(92,61,61,.12); }
    .value-icon { font-size: 2rem; margin-bottom: 1rem; }
    .value-name { font-family: var(--ff-display); font-size: 1.25rem; font-weight: 600; color: var(--bark); margin-bottom: .5rem; }
    .value-desc { font-size: .9rem; color: var(--muted); line-height: 1.6; }

/* ==========================================
   SECCIÓN CÓMO TRABAJO (TARJETAS GIRATORIAS) 
   ========================================== */
#como-trabajo { 
  background: var(--cream); 
  padding: 5rem 2rem;
}

.como-trabajo-cabecera { 
  text-align: center; 
  margin-bottom: 3rem; 
}

/* Contenedor que vuelve a poner las 3 tarjetas en fila horizontal */
.como-trabajo-contenedor { 
  display: flex !important; 
  flex-direction: row !important; 
  justify-content: center !important; 
  gap: 24px !important; 
  width: 100% !important; 
  perspective: 1000px !important; 
  flex-wrap: wrap !important; 
}

/* Recuperamos el tamaño original de tarjeta de tu primer código */
.tarjeta-giratoria { 
  flex: 1 !important; 
  min-width: 280px !important; 
  max-width: 360px !important;
  height: 440px !important; 
  background-color: transparent !important; 
}

.tarjeta-interno { 
  position: relative !important; 
  width: 100% !important; 
  height: 100% !important; 
  text-align: left !important; 
  transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1) !important; 
  transform-style: preserve-3d !important; 
  box-shadow: var(--shadow) !important; 
  border-radius: var(--radius-md) !important; 
}

/* Efecto de giro al pasar el ratón */
.tarjeta-giratoria:hover .tarjeta-interno { 
  transform: rotateY(180deg) !important; 
}

/* Propiedades comunes para ambas caras */
.tarjeta-frontal, .tarjeta-trasera { 
  position: absolute !important; 
  width: 100% !important; 
  height: 100% !important; 
  -webkit-backface-visibility: hidden !important; 
  backface-visibility: hidden !important; 
  border-radius: var(--radius-md) !important; 
  box-sizing: border-box !important; 
}

/* CARA FRONTAL: Con tu nuevo color suave modificado */
.tarjeta-frontal { 
  background-color: var(--blush) !important; /* Color suave de fondo */
  padding: 24px 20px 0 20px !important; 
  display: flex !important;
  flex-direction: column !important;
}

.contenido-frontal { 
  display: flex !important; 
  flex-direction: column !important; 
  height: 100% !important; 
  justify-content: space-between !important; 
}

.bloque-texto-frontal { 
  text-align: center !important; 
  margin-bottom: 15px !important; 
}

/* Títulos oscuros legibles sobre el fondo suave */
.tarjeta-frontal h3 { 
  font-family: var(--ff-display) !important; 
  color: var(--bark) !important; 
  font-size: 1.6rem !important; 
  font-weight: 600 !important; 
  letter-spacing: 0.5px !important; 
  margin: 0 0 10px 0 !important; 
  text-align: center !important; 
}

.subtitulo-frontal { 
  color: var(--text) !important; 
  font-size: 0.95rem !important; 
  line-height: 1.4 !important; 
  margin: 0 !important; 
  text-align: center !important; 
  opacity: 0.9 !important;
}

/* Bloque para que los koalas se asienten abajo sin pisar las letras */
.bloque-imagen-frontal { 
  flex: 1 !important; 
  display: flex !important; 
  align-items: flex-end !important; 
  justify-content: center !important; 
  overflow: hidden !important; 
  border-bottom-left-radius: var(--radius-md) !important; 
  border-bottom-right-radius: var(--radius-md) !important; 
}

.imagen-frontal-tarjeta { 
  width: 100% !important; 
  height: 90% !important; 
  object-fit: contain !important; 
  mix-blend-mode: multiply !important; 
}

/* CARA TRASERA: Inversión de colores (Fondo oscuro y texto claro) */
.tarjeta-trasera { 
  background-color: var(--bark) !important; /* Cambiado a marrón oscuro */
  color: var(--cream) !important; /* Cambiado a texto crema claro */
  transform: rotateY(180deg) !important; 
  display: flex !important; 
  align-items: flex-start !important; 
  border: 2px solid var(--cream) !important; /* Borde claro para que resalte */
  overflow-y: auto !important; 
  padding: 28px 24px !important; 
}

.contenido-trasero { 
  width: 100% !important; 
  display: flex !important; 
  flex-direction: column !important; 
  gap: 16px !important; 
}

.titulo-trasero { 
  font-family: var(--ff-display) !important; 
  color: var(--cream) !important; /* Título interno en crema claro */
  font-size: 1.2rem !important; 
  font-weight: bold !important; 
  margin: 0 !important; 
  letter-spacing: 1px !important; 
  border-bottom: 1px solid rgba(255, 255, 255, 0.2) !important; /* Línea divisoria clara y sutil */
  padding-bottom: 8px !important; 
  text-align: center !important; 
}

.tarjeta-trasera ul { 
  list-style-type: none !important; 
  padding: 0 !important; 
  margin: 0 !important; 
}

.tarjeta-trasera li { 
  font-size: 0.85rem !important; 
  line-height: 1.45 !important; 
  margin-bottom: 12px !important; 
  position: relative !important; 
  padding-left: 15px !important; 
  text-align: left !important;
  color: var(--cream) !important; /* Asegura que toda la lista sea clara */
}

/* Cambia los textos en negrita (strong) a un color crema puro para que resalten */
.tarjeta-trasera li strong {
  color: var(--white) !important;
}

/* Cambiamos el punto de la lista a crema claro para que se vea sobre el fondo oscuro */
.tarjeta-trasera li::before { 
  content: "•" !important; 
  color: var(--rose) !important; /* Usamos tu color rosa/rosa viejo para darle un toque destacado al punto */
  position: absolute !important; 
  left: 0 !important; 
  top: 0 !important; 
  font-weight: bold !important; 
}

.tarjeta-trasera li:last-child { 
  margin-bottom: 0 !important; 
}
  /* SECCIÓN CONTACTO UNIFICADA */
#seccion-contacto {
  background-color: var(--white);
  padding: 5rem 2rem;
}

.contacto-flex-contenedor {
  display: flex !important;
  flex-direction: row !important; /* Coloca la tarjeta a la izquierda y formulario a la derecha */
  justify-content: center !important;
  align-items: stretch !important; /* Hace que ambos bloques tengan la misma altura si es posible */
  gap: 45px !important;
  max-width: 1100px;
  margin: 0 auto;
  flex-wrap: wrap !important;
}

.tarjeta-datos-contacto-oscura, .formulario-contacto {
  flex: 1 !important;
  min-width: 320px !important;
  max-width: 480px !important;
  box-sizing: border-box !important;
}

/* TARJETA ESTILO OSCURO (Como la trasera de Cómo Trabajo) */
.tarjeta-datos-contacto-oscura {
  background-color: var(--bark) !important; /* Fondo marrón oscuro */
  border: 2px solid var(--cream) !important; /* Borde claro para separar con sutileza */

  border-radius: 24px;
  box-shadow: var(--shadow);
}

.datos-contacto-cabecera {
  display: flex;
  align-items: center;
  justify-content: center;

  margin-bottom: 30px;
}

.datos-contacto-titulo {

  color: var(--cream) !important; /* Texto claro */

  font-weight: 600;
  margin: 0;
}

.corazon-icono {
  font-size: 1.3rem;
}

.lista-datos-contacto {
  list-style-type: none !important;
  padding: 0 !important;
  margin: 0 !important;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.lista-datos-contacto li {
  display: flex;
  align-items: center;
  gap: 14px;
  margin: 0 !important;
  padding: 0 !important;
}

.lista-datos-contacto li::before {
  content: none !important; /* Limpia cualquier punto residual */
}

.dato-icono {
  font-size: 1.2rem;
  width: 24px;
  text-align: center;
  flex-shrink: 0;
}

/* Líneas divisorias internas con tono sutil claro */
.dato-linea {
  flex: 1;
  display: flex;
  justify-content: flex-start;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid rgba(250, 246, 240, 0.2) !important; 
  padding-bottom: 8px;
}

.dato-etiqueta {
  font-weight: 600;
  color: var(--white) !important; /* Etiquetas en blanco para jerarquía */
  font-size: 0.95rem;
  white-space: nowrap;
}

.dato-valor {
  color: var(--cream) !important; /* Valores en color crema suave */
  font-size: 0.95rem;
}

/* ESTILOS DEL FORMULARIO DE CONTACTO (Se mantienen limpios en blanco) */
.formulario-contacto {
  background-color: #ffffff;
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
}

.titulo-contacto {
  color: var(--bark);
  font-size: 24px;
  margin-bottom: 20px;
  font-family: var(--ff-display);
  font-weight: 600;
}

.campo-grupo {
  margin-bottom: 20px;
  text-align: left;
}

.campo-grupo label {
  display: block;
  margin-bottom: 8px;
  color: var(--bark);
  font-weight: 600;
  font-size: 14px;
}

.campo-grupo input, .campo-grupo textarea {
  width: 100%;
  padding: 12px;
  border: 1px solid #e0dcd8;
  border-radius: 8px;
  font-size: 15px;
  color: #333333;
  background-color: #fdfcfb;
  box-sizing: border-box;
}

.campo-grupo textarea {
  height: 120px;
  resize: vertical;
}

.boton-enviar {
  width: 100%;
  padding: 14px;
  background-color: var(--bark);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  transition: background-color 0.3s ease;
}

.boton-enviar:hover {
  background-color: var(--rose);
}

/* RESPONSIVE: En móviles se apila verticalmente */
@media (max-width: 768px) {
  .contacto-flex-contenedor {
    flex-direction: column !important;
    align-items: center !important;
    gap: 35px !important;
  }
  .tarjeta-datos-contacto-oscura, .formulario-contacto {
    max-width: 100% !important;
    width: 100% !important;
  }
  .dato-linea {
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
  }
}
