<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sandra Carrera — Psicóloga especializada en TEA y NEE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream:  #FAF6F0;
      --blush:  #EDD9CC;
      --rose:   #C9897A;
      --mauve:  #8B5E6A;
      --bark:   #5C3D3D;
      --text:   #3D2929;
      --muted:  #9A7878;
      --white:  #FFFFFF;
      --dark:   #3D2929;
      --ff-display: 'Cormorant Garamond', Georgia, serif;
      --ff-body:    'DM Sans', system-ui, sans-serif;
      --radius-sm: 12px;
      --radius-md: 20px;
      --radius-lg: 32px;
      --shadow: 0 4px 24px rgba(92,61,61,.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--cream); color: var(--text); font-family: var(--ff-body); font-size: 1rem; line-height: 1.65; }

    nav { position: sticky; top: 0; z-index: 100; background: rgba(250,246,240,.92); backdrop-filter: blur(8px); border-bottom: 1px solid var(--blush); display: flex; align-items: center; justify-content: space-between; padding: .75rem 2rem; }
    .nav-logo { font-family: var(--ff-display); font-size: 1.25rem; color: var(--mauve); text-decoration: none; font-style: italic; }
    .nav-links { display: flex; gap: 1.75rem; list-style: none; }
    .nav-links a { text-decoration: none; color: var(--bark); font-size: .875rem; font-weight: 500; letter-spacing: .02em; transition: color .2s; }
    .nav-links a:hover { color: var(--rose); }

    .hero { display: grid; grid-template-columns: 1fr 1fr; min-height: 88vh; align-items: center; max-width: 1100px; margin: 0 auto; padding: 4rem 2rem; gap: 4rem; }
    .eyebrow { display: inline-block; font-size: .75rem; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; color: var(--rose); margin-bottom: 1rem; }
    .hero h1 { font-family: var(--ff-display); font-size: clamp(2.8rem, 5vw, 4.2rem); font-weight: 400; line-height: 1.12; color: var(--bark); margin-bottom: 1.5rem; }
    .hero h1 em { font-style: italic; color: var(--mauve); }
    .hero-desc { font-size: 1.05rem; color: var(--muted); max-width: 420px; margin-bottom: 2rem; }
    .badge-row { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 2.5rem; }
    .badge { display: inline-flex; align-items: center; gap: .4rem; background: var(--white); border: 1px solid var(--blush); color: var(--mauve); font-size: .8rem; font-weight: 500; padding: .35rem .85rem; border-radius: 999px; box-shadow: var(--shadow); }
    .btn-primary { display: inline-block; background: var(--mauve); color: var(--white); text-decoration: none; padding: .85rem 2rem; border-radius: 999px; font-weight: 500; font-size: .95rem; letter-spacing: .02em; transition: background .2s, transform .15s; border: none; cursor: pointer; }
    .btn-primary:hover { background: var(--bark); transform: translateY(-1px); }
    .photo-card { position: relative; border-radius: var(--radius-lg); overflow: hidden; aspect-ratio: 4/5; background: var(--blush); box-shadow: 0 16px 48px rgba(92,61,61,.14); }
    .photo-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--mauve); font-family: var(--ff-display); font-size: 1.1rem; font-style: italic; gap: 1rem; padding: 2rem; text-align: center; }
    .tagline-ribbon { position: absolute; bottom: 1.5rem; left: 1.5rem; right: 1.5rem; background: rgba(250,246,240,.9); backdrop-filter: blur(6px); border-radius: var(--radius-sm); padding: .85rem 1.1rem; font-family: var(--ff-display); font-style: italic; font-size: 1.05rem; color: var(--mauve); text-align: center; }

    section { padding: 5rem 2rem; }
    .section-inner { max-width: 1100px; margin: 0 auto; }
    .section-label { font-size: .75rem; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; color: var(--rose); margin-bottom: .5rem; display: block; }
    .section-title { font-family: var(--ff-display); font-size: clamp(2rem, 3.5vw, 2.8rem); font-weight: 400; color: var(--bark); margin-bottom: 1rem; line-height: 1.2; }
    .section-title em { font-style: italic; color: var(--mauve); }
    .section-intro { font-size: 1.05rem; color: var(--muted); max-width: 560px; margin-bottom: 3rem; }

    #sobre-mi { background: var(--white); }
    .about-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; }
    .about-quote { font-family: var(--ff-display); font-size: 1.5rem; font-style: italic; color: var(--mauve); border-left: 3px solid var(--blush); padding-left: 1.5rem; margin-bottom: 1.5rem; line-height: 1.4; }
    .about-body { color: var(--text); line-height: 1.75; }

    /* ESTILOS DE SECCIÓN VALORES CORREGIDOS */
    .seccion-valores-cabecera {
      text-align: center;
      margin-bottom: 2rem;
      margin-top: 1rem;
    }
    .valores-titulo {
      font-family: var(--ff-display, sans-serif);
      font-size: 2.2rem;
      color: var(--bark);
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .linea-decorativa {
      width: 60px;
      height: 3px;
      background-color: var(--rose);
      margin: 0 auto;
      border-radius: 2px;
    }
    .values-list {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      gap: 1.25rem;
      margin-top: 2rem;
      width: 100%;
    }
    .value-item {
      flex: 1;
      min-width: 220px;
      background-color: var(--white);
      border: 1px solid var(--blush);
      border-radius: var(--radius-md);
      padding: 2rem 1.5rem;
      box-shadow: var(--shadow);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .value-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 36px rgba(92,61,61,.12);
    }
    .value-icon {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    .value-name {
      font-family: var(--ff-display);
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--bark);
      margin-bottom: .5rem;
    }
    .value-desc {
      font-size: .9rem;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ESTILOS DE CÓMO TRABAJO (TARJETAS GIRATORIAS 3D) */
    .como-trabajo-seccion {
      padding: 5rem 2rem;
      max-width: 1100px;
      margin: 0 auto;
      text-align: center;
    }
    .como-trabajo-titulo {
      font-family: var(--ff-display, sans-serif);
      font-size: 2.2rem;
      color: var(--bark);
      margin-bottom: 35px;
      font-weight: 600;
    }
    .como-trabajo-contenedor {
      display: flex;
      flex-direction: row;
      justify-content: center;
      gap: 24px;
      width: 100%;
      perspective: 1000px;
    }
    .tarjeta-giratoria {
      flex: 1;
      min-width: 280px;
      height: 440px;
      background-color: transparent;
    }
    .tarjeta-interno {
      position: relative;
      width: 100%;
      height: 100%;
      text-align: left;
      transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
      box-shadow: var(--shadow);
      border-radius: var(--radius-md);
    }
    .tarjeta-giratoria:hover .tarjeta-interno {
      transform: rotateY(180deg);
    }
    .tarjeta-frontal, .tarjeta-trasera {
      position: absolute;
      width: 100%;
      height: 100%;
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
      border-radius: var(--radius-md);
      padding: 28px 24px;
      box-sizing: border-box;
    }
    .tarjeta-frontal {
      background-color: var(--bark);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .tarjeta-frontal h3 {
      font-family: var(--ff-display, sans-serif);
      color: var(--cream);
      font-size: 1.5rem;
      font-weight: 500;
      letter-spacing: 1px;
      text-align: center;
      margin: 0;
    }
    .tarjeta-trasera {
      background-color: var(--cream);
      color: var(--bark);
      transform: rotateY(180deg);
      display: flex;
      align-items: center;
      border: 2px solid var(--bark);
    }
    .tarjeta-trasera ul {
      list-style-type: none;
      padding: 0;
      margin: 0;
    }
    .tarjeta-trasera li {
      font-size: 0.85rem;
      line-height: 1.45;
      margin-bottom: 12px;
      position: relative;
      padding-left: 15px;
    }
    .tarjeta-trasera li::before {
      content: "•";
      color: var(--bark);
      position: absolute;
      left: 0;
      top: 0;
      font-weight: bold;
    }
    .tarjeta-trasera li:last-child {
      margin-bottom: 0;
    }

    /* RESPONSIVIDAD PARA CELULARES Y TABLETS */
    @media (max-width: 900px) {
      .hero { grid-template-columns: 1fr; text-align: center; padding: 2rem 1rem; gap: 2rem; }
      .hero-desc { margin: 0 auto 2rem; }
      .badge-row { justify-content: center; }
      .about-grid { grid-template-columns: 1fr; gap: 2rem; }
      .values-list { flex-direction: column; gap: 1.5rem; }
      .como-trabajo-contenedor { flex-direction: column; align-items: center; }
      .tarjeta-giratoria { width: 100%; max-width: 400px; height: auto; min-height: 400px; }
      .tarjeta-interno { height: 100%; }
    }
  </style>
</head>
<body>

      <li><a href="#como-trabajo">Cómo trabajo</a></li>

    </ul>
  </nav>
